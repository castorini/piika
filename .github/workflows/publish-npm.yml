name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        run: |
          version="$(node -p "require('./package.json').version")"
          test "${{ github.event.release.tag_name }}" = "v$version"

      - name: Check formatting, lint, and types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Smoke test CLI
        run: |
          node bin/piika.js --help
          node bin/piika.js --version
          node bin/piika.js benchmarks
          node bin/piika.js setup benchmark-template --dry-run
          node bin/piika.js run --benchmark benchmark-template --query-set test --dry-run

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish
